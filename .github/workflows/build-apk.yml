name: 🤖 Build Android APK — Ross Messenger

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Next.js Server URL (APK shuga ulanadi)'
        required: false
        default: 'https://your-nextjs-server.vercel.app'
      build_type:
        description: 'Build turi'
        required: false
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── 3. Java ──────────────────────────────────────────
      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      # ── 4. Android SDK ───────────────────────────────────
      - name: 🔧 Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install deps ──────────────────────────────────
      - name: 📦 Install npm dependencies
        run: npm ci

      # ── 6. Next.js build ─────────────────────────────────
      - name: 🏗️ Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_TG_APP_ID: ${{ secrets.TG_APP_ID }}
          NEXT_PUBLIC_TG_APP_HASH: ${{ secrets.TG_APP_HASH }}
          NEXT_PUBLIC_WORKER_URL: ${{ secrets.WORKER_URL }}
          NEXT_PUBLIC_APP_NAME: Ross_messenger
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ── 7. Capacitor JSON config ──────────────────────────
      - name: ⚙️ Write capacitor.config.json (production)
        run: |
          SERVER_URL="${{ github.event.inputs.server_url || secrets.NEXT_SERVER_URL || 'https://ross-messenger.vercel.app' }}"
          echo "Using server URL: $SERVER_URL"
          cat > capacitor.config.json << EOF
          {
            "appId": "com.ross.messenger",
            "appName": "Ross Messenger",
            "webDir": "www",
            "server": {
              "url": "$SERVER_URL",
              "androidScheme": "https",
              "cleartext": true,
              "allowNavigation": [
                "tg-proxy.moxirbekmoxirbek29.workers.dev",
                "*.telegram.org",
                "cdn*.telegram.org"
              ]
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false
            },
            "plugins": {
              "StatusBar": {
                "style": "Dark",
                "backgroundColor": "#17212B"
              },
              "Keyboard": {
                "resize": "body",
                "style": "dark"
              }
            }
          }
          EOF

      # ── 8. Add Android platform ───────────────────────────
      - name: 📱 Add Capacitor Android platform
        run: npx cap add android || echo "Android platform already exists"

      # ── 9. Sync Capacitor ─────────────────────────────────
      - name: 🔄 Sync Capacitor
        run: npx cap sync android
        env:
          NODE_OPTIONS: '--max-old-space-size=2048'

      # ── 10. Gradle permissions ────────────────────────────
      - name: 🔑 Grant Gradle permissions
        run: chmod +x android/gradlew

      # ── 11. Build APK (debug) ─────────────────────────────
      - name: 🔨 Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dfile.encoding=UTF-8
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false'

      # ── 11b. Build APK (release) ──────────────────────────
      - name: 🚀 Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Dfile.encoding=UTF-8
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx3g -Dorg.gradle.daemon=false'

      # ── 12. List APK files ────────────────────────────────
      - name: 🔍 Find APK files
        if: always()
        run: |
          echo "=== APK files found ==="
          find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found yet"

      # ── 13. Upload Debug APK ──────────────────────────────
      - name: 📤 Upload Debug APK
        if: ${{ github.event.inputs.build_type != 'release' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ross-messenger-debug-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 14. Upload Release APK ────────────────────────────
      - name: 📤 Upload Release APK
        if: ${{ github.event.inputs.build_type == 'release' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ross-messenger-release-v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 15. Summary ───────────────────────────────────────
      - name: 📊 Build Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="❌"
          
          echo "## $ICON APK Build — Ross Messenger" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | $STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build #** | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ github.event.inputs.build_type || 'debug' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **App ID** | com.ross.messenger |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📥 APK ni **Artifacts** bo'limidan yuklab oling ⬆️" >> $GITHUB_STEP_SUMMARY
